apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-app
  namespace: monitoring-app
  labels:
    app: monitoring-app
    version: "1.0"
spec:
  replicas: 2

  selector:
    matchLabels:
      app: monitoring-app

  # ─── Rolling Update: zero-downtime deploys ──────────────────────────────────
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  # ─── Minimum ready time before marking pod as available ─────────────────────
  minReadySeconds: 10

  template:
    metadata:
      labels:
        app: monitoring-app
        version: "1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"

    spec:
      serviceAccountName: monitoring-app-sa

      # ─── Spread pods across nodes (high availability) ────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: monitoring-app

      # ─── Prevent all pods on same node ───────────────────────────────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: monitoring-app
                topologyKey: kubernetes.io/hostname

      # ─── Allow graceful shutdown time ────────────────────────────────────────
      terminationGracePeriodSeconds: 30

      containers:
        - name: monitoring-app
          image: monitoring-app:1.0         # Replace with registry URL in prod
          imagePullPolicy: Always           # Use Always when pulling from registry

          ports:
            - containerPort: 3000
              name: http
              protocol: TCP

          # ─── Environment from ConfigMap ────────────────────────────────────
          envFrom:
            - configMapRef:
                name: monitoring-app-config

          # ─── Sensitive env from Secret ─────────────────────────────────────
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: monitoring-app-secret
                  key: API_KEY

          # ─── Resource limits (tune based on your actual app usage) ─────────
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "150m"
              memory: "128Mi"

          # ─── Startup probe: give app time to initialize ────────────────────
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            failureThreshold: 10
            periodSeconds: 5

          # ─── Liveness probe: restart if app is stuck ──────────────────────
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          # ─── Readiness probe: only send traffic when ready ─────────────────
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # ─── Security context ──────────────────────────────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          # ─── Writable temp dir (needed since rootFS is read-only) ──────────
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      # ─── Pod-level security ───────────────────────────────────────────────
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
