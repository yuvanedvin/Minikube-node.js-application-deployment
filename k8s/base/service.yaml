# ─── ClusterIP Service (internal traffic + ServiceMonitor) ───────────────────
apiVersion: v1
kind: Service
metadata:
  name: monitoring-app
  namespace: monitoring-app
  labels:
    app: monitoring-app
spec:
  type: ClusterIP
  selector:
    app: monitoring-app
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP

---
# ─── NodePort Service (for Minikube external access) ─────────────────────────
# Access via: minikube service monitoring-app-nodeport -n monitoring-app --url
apiVersion: v1
kind: Service
metadata:
  name: monitoring-app-nodeport
  namespace: monitoring-app
  labels:
    app: monitoring-app
spec:
  type: NodePort
  selector:
    app: monitoring-app
  ports:
    - name: http
      port: 80
      targetPort: 3000
      nodePort: 30080
      protocol: TCP
